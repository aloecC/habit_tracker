
services:
  # 1. База данных
  db:
    env_file:
      - .env
    image: postgres:17
    environment:
      - POSTGRES_DB=${NAME}
      - POSTGRES_USER=${USER}
      - POSTGRES_PASSWORD=${PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. Redis (Брокер для Celery)
  redis:
    env_file:
      - .env
    image: redis:alpine
    ports:
      - "6379:6379"

  # 3. Основное Django приложение
  app:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    # command: poetry run gunicorn config.wsgi:application --bind 0.0.0.0:8000 # Для продакшна
    volumes:
      - .:/app
      - media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - db

  # 5. Celery Worker
  worker:
    build: .
    env_file:
      - .env
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

  # 5. Telegram Bot
  bot:
    build: .
    command: python manage.py runbot
    volumes:
      - .:/app
    env_file:
       - .env
    depends_on:
      - app
      - redis
volumes:
  postgres_data:
  media: